services:
  # GitSnip React Frontend
  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    container_name: gitsnip-frontend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gitsnip-network
    profiles:
      - frontend
      - fullstack

  # GitSnip Python Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gitsnip-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=4000
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./temp:/app/temp
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gitsnip-network
    profiles:
      - backend
      - fullstack

  # Reverse Proxy (for production deployment)
  nginx-proxy:
    image: nginx:alpine
    container_name: gitsnip-proxy
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - gitsnip-network
    profiles:
      - proxy

networks:
  gitsnip-network:
    driver: bridge

volumes:
  gitsnip-data:
    driver: local

